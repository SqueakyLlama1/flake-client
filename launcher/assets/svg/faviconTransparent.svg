<svg xmlns="http://www.w3.org/2000/svg" viewBox="-100 -100 200 200" width="300" height="300">
  <style>
    .snowflake-branch {
      stroke: #edfbfe;
      stroke-width: 10;
      stroke-linecap: round;
    }
  </style>

  <defs>
    <g id="branch">
      <line x1="0" y1="0" x2="0" y2="-90" class="snowflake-branch" />
      
      <line x1="0" y1="-70" x2="-15" y2="-80" class="snowflake-branch" />
      <line x1="0" y1="-70" x2="15" y2="-80" class="snowflake-branch" />
      
      <line x1="0" y1="-45" x2="-25" y2="-60" class="snowflake-branch" />
      <line x1="0" y1="-45" x2="25" y2="-60" class="snowflake-branch" />
    </g>
  </defs>

  <use href="#branch" transform="rotate(0)" />
  <use href="#branch" transform="rotate(60)" />
  <use href="#branch" transform="rotate(120)" />
  <use href="#branch" transform="rotate(180)" />
  <use href="#branch" transform="rotate(240)" />
  <use href="#branch" transform="rotate(300)" />
</svg>
